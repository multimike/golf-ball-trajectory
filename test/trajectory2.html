<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golf Ball Trajectory Simulation</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f0f2f5;
            color: #333;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            background: #ffffff;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 10;
        }
        .sidebar h2 {
            margin-top: 0;
            color: #1a4d2e;
        }
        .sidebar p {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 12px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e9ecef;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 0.9em;
        }
        small {
            color: #888;
            font-weight: normal;
        }
        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1em;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover {
            background: #218838;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            gap: 20px;
        }
        .panel {
            background: #fff;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .panel h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #333;
        }
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }
        #canvas-container {
            flex: 1;
            min-height: 400px;
            width: 100%;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #87CEEB;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #e9ecef;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 1.1em;
        }
        .stats span { color: #007bff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Golf Ball Simulator</h2>
        <p>Simulation based on models of golf ball aerodynamics (MDPI 2504-3900/2/6/238).</p>
        
        <div class="form-group">
            <label>Units</label>
            <select id="units" onchange="runSimulation()">
                <option value="yards">Yards</option>
                <option value="meters">Meters</option>
            </select>
        </div>

        <div class="form-group">
            <label>Ball Speed (mph)</label>
            <input type="number" id="speed" value="160" step="1" min="10" max="250">
        </div>
        <div class="form-group">
            <label>Launch Angle (deg)</label>
            <input type="number" id="launch" value="12" step="0.5" min="-10" max="80">
        </div>
        <div class="form-group">
            <label>Launch Direction / Azimuth (deg) <br><small>(- Left / + Right)</small></label>
            <input type="number" id="azimuth" value="0" step="1" min="-90" max="90">
        </div>

        <div class="form-group">
            <label>Spin Input Mode</label>
            <select id="spinMode" onchange="toggleSpinInputs()">
                <option value="total_axis">Total Spin & Axis</option>
                <option value="back_side">Backspin & Sidespin</option>
            </select>
        </div>

        <div id="mode-total-axis">
            <div class="form-group">
                <label>Total Spin Rate (rpm)</label>
                <input type="number" id="spin" value="2500" step="100" min="0" max="12000">
            </div>
            <div class="form-group">
                <label>Spin Axis Tilt (deg) <br><small>(- Draw(L) / + Fade(R))</small></label>
                <input type="number" id="axis" value="0" step="1" min="-90" max="90">
            </div>
        </div>

        <div id="mode-back-side" style="display: none;">
            <div class="form-group">
                <label>Backspin (rpm)</label>
                <input type="number" id="backspin" value="2500" step="100" min="0" max="12000">
            </div>
            <div class="form-group">
                <label>Sidespin (rpm) <br><small>(- Draw(L) / + Fade(R))</small></label>
                <input type="number" id="sidespin" value="0" step="100" min="-5000" max="5000">
            </div>
        </div>

        <button onclick="runSimulation()">Simulate Shot</button>
        
        <div style="margin-top:20px;">
            <p><strong>3D View Instructions:</strong></p>
            <ul style="font-size:0.85em; padding-left: 20px; color:#555;">
                <li>Drag to rotate the camera.</li>
                <li>Scroll to zoom in/out.</li>
                <li>Right-click + drag to pan.</li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div class="panel">
            <div class="stats" id="stats-board">
                <div>Carry: <span id="stat-carry">0.0</span> <span class="unit-label">yds</span></div>
                <div>Max Height: <span id="stat-height">0.0</span> <span class="unit-label">yds</span></div>
                <div>Offline: <span id="stat-offline">0.0</span> <span class="unit-label">yds</span></div>
            </div>
            <div class="chart-container">
                <canvas id="trajectoryChart"></canvas>
            </div>
        </div>
        
        <div class="panel" style="flex: 1; display: flex; flex-direction: column;">
            <h3>3D Driving Range View</h3>
            <div id="canvas-container"></div>
        </div>
    </div>

    <script>
        // --- UI LOGIC ---
        function toggleSpinInputs() {
            const mode = document.getElementById('spinMode').value;
            if (mode === 'total_axis') {
                document.getElementById('mode-total-axis').style.display = 'block';
                document.getElementById('mode-back-side').style.display = 'none';
            } else {
                document.getElementById('mode-total-axis').style.display = 'none';
                document.getElementById('mode-back-side').style.display = 'block';
            }
        }

        function getUnitSettings() {
            const unit = document.getElementById('units').value;
            if (unit === 'yards') return { multiplier: 1.09361, label: 'yds' };
            return { multiplier: 1.0, label: 'm' }; // meters
        }

        // --- PHYSICS ENGINE ---
        function simulateTrajectory(speedMph, launchAngle, azimuthAngle, spinRpm, spinAxis) {
            const v0 = speedMph * 0.44704; // mph to m/s
            const theta = launchAngle * Math.PI / 180;
            const phi = azimuthAngle * Math.PI / 180;
            const alpha = spinAxis * Math.PI / 180;
            let omega_mag = spinRpm * Math.PI / 30; // rpm to rad/s

            let vx = v0 * Math.cos(theta) * Math.cos(phi);
            let vy = v0 * Math.sin(theta);
            let vz = v0 * Math.cos(theta) * Math.sin(phi);

            let x = 0, y = 0, z = 0;
            
            // Spin vector
            let omega_x = 0;
            let omega_y = -omega_mag * Math.sin(alpha);
            let omega_z = omega_mag * Math.cos(alpha);

            const dt = 0.01;
            const m = 0.0459; 
            const r = 0.02135; 
            const A = Math.PI * r * r;
            const rho = 1.225; 
            
            let trajectory = [{x: 0, y: 0, z: 0}];

            while (y >= 0 && trajectory.length < 2500) {
                let V = Math.sqrt(vx*vx + vy*vy + vz*vz);
                if (V === 0) break;

                let current_omega_mag = Math.sqrt(omega_x*omega_x + omega_y*omega_y + omega_z*omega_z);
                let S = (r * current_omega_mag) / V;
                
                // Lift and Drag per aerodynamic model
                let Cd = 0.21 + 0.1 * S;
                let Cl = 0.05 + 1.5 * S;

                let Fd = 0.5 * rho * A * Cd * V * V;
                let Fdx = -Fd * vx / V;
                let Fdy = -Fd * vy / V;
                let Fdz = -Fd * vz / V;

                let cx = omega_y * vz - omega_z * vy;
                let cy = omega_z * vx - omega_x * vz;
                let cz = omega_x * vy - omega_y * vx;
                let cmag = Math.sqrt(cx*cx + cy*cy + cz*cz);

                let Flx = 0, Fly = 0, Flz = 0;
                if (cmag > 0) {
                    let Fl = 0.5 * rho * A * Cl * V * V;
                    Flx = Fl * cx / cmag;
                    Fly = Fl * cy / cmag;
                    Flz = Fl * cz / cmag;
                }

                let ax = (Fdx + Flx) / m;
                let ay = (Fdy + Fly) / m - 9.81;
                let az = (Fdz + Flz) / m;

                vx += ax * dt;
                vy += ay * dt;
                vz += az * dt;
                x += vx * dt;
                y += vy * dt;
                z += vz * dt;

                // Spin decay
                omega_x -= 0.04 * omega_x * dt;
                omega_y -= 0.04 * omega_y * dt;
                omega_z -= 0.04 * omega_z * dt;

                if (y >= 0) trajectory.push({x: x, y: y, z: z});
            }
            return trajectory;
        }

        // --- 2D CHART (Chart.js) ---
        let chartInstance = null;
        function renderChart(trajectory, unitMultiplier, unitLabel) {
            const data = trajectory.map(p => ({ x: p.x * unitMultiplier, y: p.y * unitMultiplier }));
            
            if (chartInstance) chartInstance.destroy();
            
            const ctx = document.getElementById('trajectoryChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: `Trajectory Height`,
                        data: data,
                        borderColor: '#28a745',
                        backgroundColor: 'rgba(40, 167, 69, 0.2)',
                        showLine: true,
                        pointRadius: 0,
                        borderWidth: 3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            type: 'linear', position: 'bottom',
                            title: { display: true, text: `Distance (${unitLabel})`, font: { weight: 'bold' } },
                            min: 0, max: Math.ceil((data[data.length-1].x + 20) / 50) * 50
                        },
                        y: {
                            title: { display: true, text: `Height (${unitLabel})`, font: { weight: 'bold' } },
                            min: 0, max: Math.max(80, Math.ceil(Math.max(...data.map(d=>d.y)) + 10))
                        }
                    }
                }
            });
        }

        // --- 3D SCENE (Three.js) ---
        let scene, camera, renderer, controls;
        let trajectoryLine, ballMesh, shadowMesh, markersGroup;
        let currentFrame = 0;
        let trajData = [];

        function init3D() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 50, 600);
            
            camera = new THREE.PerspectiveCamera(55, container.clientWidth / container.clientHeight, 0.1, 1000);
            camera.position.set(0, 6, 15);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 2, -50);
            controls.maxPolarAngle = Math.PI / 2 - 0.01;
            controls.update();
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(150, 200, 50);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 200;
            dirLight.shadow.camera.bottom = -200;
            dirLight.shadow.camera.left = -200;
            dirLight.shadow.camera.right = 200;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);
            
            // Ground
            const groundGeo = new THREE.PlaneGeometry(300, 1000);
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d6a4f });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.z = -400;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Tee Box
            const teeGeo = new THREE.PlaneGeometry(20, 10);
            const teeMat = new THREE.MeshLambertMaterial({ color: 0x1b4332 });
            const tee = new THREE.Mesh(teeGeo, teeMat);
            tee.rotation.x = -Math.PI / 2;
            tee.position.y = 0.01;
            tee.receiveShadow = true;
            scene.add(tee);

            // Ball & Shadow
            const ballGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
            ballMesh = new THREE.Mesh(ballGeo, ballMat);
            ballMesh.castShadow = true;
            scene.add(ballMesh);

            const shadowGeo = new THREE.CircleGeometry(0.5, 16);
            const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.4 });
            shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
            shadowMesh.rotation.x = -Math.PI / 2;
            scene.add(shadowMesh);
            
            generateTrees();

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            
            animate();
        }

        // Generate procedural trees around the fairway
        function generateTrees() {
            const treeGroup = new THREE.Group();
            
            for (let i = 0; i < 80; i++) {
                // Randomize sides (Left or Right)
                const isLeft = Math.random() > 0.5;
                const x = (isLeft ? -1 : 1) * (40 + Math.random() * 80);
                const z = -(Math.random() * 500);
                
                // Height between 20 and 30 meters
                const height = 20 + Math.random() * 10; 
                const trunkHeight = height * 0.25;
                const leavesHeight = height * 0.75;

                // Trunk
                const trunkGeo = new THREE.CylinderGeometry(0.6, 1, trunkHeight, 7);
                const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3b2c });
                const trunk = new THREE.Mesh(trunkGeo, trunkMat);
                trunk.position.set(x, trunkHeight / 2, z);
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                treeGroup.add(trunk);

                // Leaves
                const leavesGeo = new THREE.ConeGeometry(height * 0.22, leavesHeight, 7);
                const leavesMat = new THREE.MeshLambertMaterial({ color: 0x1e5631 });
                const leaves = new THREE.Mesh(leavesGeo, leavesMat);
                leaves.position.set(x, trunkHeight + leavesHeight / 2, z);
                leaves.castShadow = true;
                leaves.receiveShadow = true;
                treeGroup.add(leaves);
            }
            scene.add(treeGroup);
        }

        function drawMarkers(unitMultiplier) {
            if (markersGroup) scene.remove(markersGroup);
            markersGroup = new THREE.Group();
            
            // Render every 50 units (m or yds)
            for(let d=50; d<=400; d+=50) {
                let zPos = -(d / unitMultiplier); 
                
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(-100, 0.05, zPos),
                    new THREE.Vector3(100, 0.05, zPos)
                ]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
                const line = new THREE.Line(lineGeo, lineMat);
                markersGroup.add(line);
                
                markersGroup.add(createMarkerSprite(d, -30, zPos));
                markersGroup.add(createMarkerSprite(d, 30, zPos));
            }
            scene.add(markersGroup);
        }

        function createMarkerSprite(distance, xPos, zPos) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256; canvas.height = 128;
            context.fillStyle = "rgba(0, 0, 0, 0.6)";
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.font = "Bold 65px Arial";
            context.fillStyle = "white";
            context.textAlign = "center";
            context.fillText(distance, 128, 90);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(6, 3, 1);
            sprite.position.set(xPos, 1.5, zPos);
            return sprite;
        }

        function update3DTrajectory(trajectory) {
            if (trajectoryLine) scene.remove(trajectoryLine);
            
            const points = trajectory.map(p => new THREE.Vector3(p.z, p.y, -p.x));
            const geo = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0xffd700, linewidth: 2 });
            trajectoryLine = new THREE.Line(geo, mat);
            scene.add(trajectoryLine);
            
            trajData = points;
            currentFrame = 0;
            
            camera.position.set(0, 6, 15);
            controls.target.set(0, 2, -50);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (trajData.length > 0) {
                if (currentFrame < trajData.length) {
                    let pos = trajData[currentFrame];
                    ballMesh.position.copy(pos);
                    shadowMesh.position.set(pos.x, 0.05, pos.z); 
                    
                    if (pos.z < -20) {
                        controls.target.z = pos.z - 30;
                        controls.target.x = pos.x;
                    }

                    currentFrame += Math.max(1, Math.floor(trajData.length / 150));
                } else {
                    let endPos = trajData[trajData.length - 1];
                    ballMesh.position.copy(endPos);
                    shadowMesh.position.set(endPos.x, 0.05, endPos.z);
                }
            }
            
            controls.update();
            renderer.render(scene, camera);
        }

        // --- MAIN APP LOGIC ---
        function runSimulation() {
            const speed = parseFloat(document.getElementById('speed').value);
            const launch = parseFloat(document.getElementById('launch').value);
            const azimuth = parseFloat(document.getElementById('azimuth').value);
            const mode = document.getElementById('spinMode').value;
            
            let spinRpm, spinAxis;

            if (mode === 'total_axis') {
                spinRpm = parseFloat(document.getElementById('spin').value);
                spinAxis = parseFloat(document.getElementById('axis').value);
            } else {
                const back = parseFloat(document.getElementById('backspin').value);
                const side = parseFloat(document.getElementById('sidespin').value);
                
                // Calculate total spin and axis from back & side
                // Standard convention: side > 0 is a fade (tilt right)
                spinRpm = Math.sqrt(back * back + side * side);
                spinAxis = Math.atan2(side, back) * (180 / Math.PI); 
            }

            const { multiplier, label } = getUnitSettings();
            
            // Draw driving range markers in correct unit
            drawMarkers(multiplier);

            const traj = simulateTrajectory(speed, launch, azimuth, spinRpm, spinAxis);
            
            // Update Dashboard Stats
            const lastPoint = traj[traj.length - 1];
            const carry = lastPoint.x * multiplier;
            const offline = lastPoint.z * multiplier;
            const maxHeight = Math.max(...traj.map(p => p.y)) * multiplier;

            document.getElementById('stat-carry').innerText = carry.toFixed(1);
            document.getElementById('stat-height').innerText = maxHeight.toFixed(1);
            document.getElementById('stat-offline').innerText = offline.toFixed(1);
            
            document.querySelectorAll('.unit-label').forEach(el => el.innerText = label);
            
            renderChart(traj, multiplier, label);
            update3DTrajectory(traj);
        }

        // Init
        window.onload = function() {
            init3D();
            runSimulation();
        };
    </script>
</body>
</html>
